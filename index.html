<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SInfluencer | Creator Marketing Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#f9f9ff;color:#111;line-height:1.6}
.container{width:90%;max-width:1200px;margin:auto}

.navbar{position:fixed;width:100%;background:white;padding:20px 0;box-shadow:0 4px 15px rgba(0,0,0,0.05);z-index:1000}
.nav-wrapper{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:800;background:linear-gradient(45deg,#6a00ff,#ff00aa);-webkit-background-clip:text;color:transparent}
.nav-links{display:flex;gap:30px;list-style:none}
.nav-links a{text-decoration:none;color:#333;font-weight:500}
.btn{padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:600;transition:.3s}
.btn-primary{background:linear-gradient(45deg,#6a00ff,#ff00aa);color:white}
.btn-primary:hover{opacity:0.9}

.hero{padding:160px 0 100px;background:linear-gradient(135deg,#f3e8ff,#ffe6f7);text-align:center}
.hero h1{font-size:48px;font-weight:800;margin-bottom:20px}
.hero p{max-width:700px;margin:auto;color:#555;margin-bottom:30px}

.role-select{padding:80px 0;text-align:center;background:white}
.role-buttons{display:flex;justify-content:center;gap:30px;margin-top:30px;flex-wrap:wrap}
.btn-outline{padding:12px 28px;border-radius:50px;border:2px solid #ff00aa;color:#ff00aa;text-decoration:none;font-weight:600}
.btn-outline:hover{background:#ff00aa;color:white}

.form-section{padding:80px 0;background:#f3f3ff}
.form-box{background:white;padding:40px;border-radius:20px;max-width:600px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,0.05)}
.form-box h2{text-align:center;margin-bottom:20px}
.form-box input, .form-box select, .form-box textarea{
width:100%;padding:12px;margin-bottom:15px;border-radius:10px;border:1px solid #ddd;font-family:Poppins}
.form-box button{width:100%;padding:12px;border:none;border-radius:50px;background:linear-gradient(45deg,#6a00ff,#ff00aa);color:white;font-weight:600}

.stats{background:white;padding:80px 0;text-align:center}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.stat h2{color:#6a00ff;font-size:32px}

.features{padding:100px 0;text-align:center}
.features h2{font-size:36px;margin-bottom:60px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.card{background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.05);transition:.3s}
.card:hover{transform:translateY(-10px)}

.cta{background:linear-gradient(45deg,#6a00ff,#ff00aa);color:white;text-align:center;padding:100px 0}
.cta h2{font-size:40px;margin-bottom:20px}

footer{background:#111;color:#aaa;text-align:center;padding:40px 0}

@media(max-width:992px){
.nav-links{display:none}
.grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:1fr 1fr}
.hero h1{font-size:34px}
}
</style>
</head>

<body>

<header class="navbar">
<div class="container nav-wrapper">
<div class="logo">SInfluencer</div>
<ul class="nav-links">
<li><a href="#">Platform</a></li>
<li><a href="#">Creators</a></li>
<li><a href="#">Pricing</a></li>
<li><a href="#">Contact</a></li>
</ul>
<a href="#" class="btn btn-primary">Get Started</a>
</div>
</header>

<section class="hero">
<div class="container">
<h1>Drive Powerful Creator Marketing</h1>
<p>Connect brands and creators in one powerful platform.</p>
</div>
</section>

<section class="role-select">
<div class="container">
<h2>Tell us who you are</h2>
<div class="role-buttons">
<a href="#brand-form" class="btn btn-primary">I'M A BRAND</a>
<a href="#creator-form" class="btn-outline">I'M A CREATOR</a>
</div>
</div>
</section>

<!-- BRAND FORM -->
<section class="form-section" id="brand-form">
<div class="form-box">
<h2>Brand Details</h2>

<form action="https://formspree.io/f/mvzbjjyv" method="POST" id="brandForm">

<input type="text" name="first_name" placeholder="First Name" required>
<input type="text" name="last_name" placeholder="Last Name" required>
<input type="email" name="email" placeholder="Work Email" required>
<input type="text" name="company" placeholder="Company Name" required>

<select name="company_type" required>
<option value="">Company Type</option>
<option>Startup</option>
<option>Agency</option>
<option>Enterprise</option>
</select>

<textarea name="message" rows="4" placeholder="How can we help you?" required></textarea>

<button type="submit">Submit</button>

</form>

<p id="successMessage" style="display:none;color:green;font-weight:600;margin-top:15px;">
Successfully Submitted ✅
</p>

</div>
</section>

<footer>
<p>© 2026 SInfluencer. All Rights Reserved.</p>
</footer>

<script>
const brandForm = document.getElementById("brandForm");

brandForm.addEventListener("submit", async function(event){
event.preventDefault();

const data = new FormData(brandForm);

const response = await fetch(brandForm.action, {
method: brandForm.method,
body: data,
headers: { 'Accept': 'application/json' }
});

if (response.ok) {
brandForm.reset();
document.getElementById("successMessage").style.display = "block";
}
});
</script>

</body>
</html>
